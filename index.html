<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b8c63">
<title>Medical Info Training</title>
<style>
:root {
  --green: #1b8c63;
  --green-dark: #116746;
  --mint: #e5f7ee;
  --ink: #1e2d2a;
  --muted: #667671;
  --line: #d9e5df;
  --paper: #ffffff;
  --bg: #f4fbf7;
  --gold: #f6b835;
  --red: #df5a52;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
}

* { box-sizing: border-box; }
body { margin: 0; min-width: 320px; color: var(--ink); background: radial-gradient(circle at top right, #d8f5e6, transparent 35rem), var(--bg); }
button { font: inherit; cursor: pointer; }
button:focus-visible, a:focus-visible { outline: 3px solid #1565c0; outline-offset: 3px; }
.shell { width: min(900px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 52px; }
.topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 28px; }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 800; color: var(--green-dark); letter-spacing: .02em; }
.brand-mark { display: grid; place-items: center; width: 38px; height: 38px; border-radius: 13px; color: #fff; background: var(--green); box-shadow: 0 5px 0 var(--green-dark); }
.home-link { border: 0; background: transparent; color: var(--green-dark); font-weight: 700; padding: 8px; }
.hero, .card { background: var(--paper); border: 1px solid rgba(15, 94, 63, .10); box-shadow: 0 12px 35px rgba(24, 77, 52, .08); border-radius: 24px; }
.hero { padding: clamp(24px, 5vw, 42px); margin-bottom: 22px; }
.eyebrow { color: var(--green); font-weight: 800; font-size: .83rem; letter-spacing: .08em; }
h1 { margin: 8px 0 10px; font-size: clamp(1.8rem, 5vw, 3rem); line-height: 1.17; }
h2 { margin: 4px 0 8px; font-size: clamp(1.35rem, 3vw, 1.85rem); }
.lead, .subtle { color: var(--muted); line-height: 1.7; }
.overview { display: flex; align-items: center; gap: 15px; margin-top: 24px; padding: 16px; background: var(--mint); border-radius: 16px; }
.overview strong { display: block; font-size: 1.45rem; }
.progress-wrap { flex: 1; }
.progress-track { height: 12px; overflow: hidden; border-radius: 999px; background: #dcece3; }
.progress-value { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #20ae7a, #55cf9d); transition: width .25s ease; }
.group-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
.group-card { position: relative; min-height: 150px; padding: 20px; text-align: left; border: 1px solid var(--line); border-radius: 20px; color: var(--ink); background: var(--paper); transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease; }
.group-card:hover { transform: translateY(-3px); border-color: #8ed8b5; box-shadow: 0 10px 24px rgba(26, 118, 79, .11); }
.group-card.complete { background: linear-gradient(145deg, #f2fff8, #fff); border-color: #8ed8b5; }
.group-num { color: var(--green); font-weight: 900; font-size: .82rem; }
.group-card h3 { margin: 8px 0; font-size: 1.1rem; }
.group-card p { margin: 0; color: var(--muted); font-size: .92rem; }
.done-badge { position: absolute; right: 15px; top: 15px; display: grid; place-items: center; width: 28px; height: 28px; border-radius: 50%; color: white; background: var(--green); font-weight: 900; }
.study-card { padding: clamp(22px, 4vw, 38px); }
.meta-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; color: var(--muted); font-weight: 700; font-size: .9rem; }
.question { margin: 28px 0 24px; font-size: clamp(1.3rem, 3.2vw, 1.75rem); line-height: 1.58; }
.choice-list { display: grid; gap: 11px; }
.choice { width: 100%; display: flex; align-items: flex-start; gap: 12px; text-align: left; padding: 15px 16px; color: var(--ink); background: #fff; border: 2px solid var(--line); border-radius: 15px; }
.choice:not(:disabled):hover { border-color: #65c798; background: #f6fff9; }
.choice:disabled { cursor: default; }
.choice-index { flex: 0 0 28px; display: grid; place-items: center; width: 28px; height: 28px; border-radius: 9px; color: var(--green-dark); background: var(--mint); font-weight: 900; }
.choice.correct { border-color: var(--green); background: #e8faef; }
.choice.correct .choice-index { color: white; background: var(--green); }
.choice.incorrect { border-color: var(--red); background: #fff0ee; }
.choice.incorrect .choice-index { color: white; background: var(--red); }
.answer-box { margin-top: 20px; padding: 17px; border-left: 5px solid var(--green); border-radius: 0 14px 14px 0; background: var(--mint); line-height: 1.7; }
.answer-box strong { color: var(--green-dark); }
.actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px; }
.primary, .secondary, .danger { border: 0; border-radius: 14px; padding: 14px 20px; font-weight: 800; }
.primary { color: white; background: var(--green); box-shadow: 0 4px 0 var(--green-dark); }
.primary:hover { background: #159267; }
.secondary { color: var(--green-dark); background: var(--mint); }
.danger { color: #a33f39; background: #fff0ee; }
.quiz-note { margin: 18px 0 0; padding: 13px 15px; border-radius: 13px; color: #795400; background: #fff7dd; line-height: 1.55; }
.result { margin-top: 20px; padding: 18px; border-radius: 16px; font-weight: 700; line-height: 1.65; }
.result.ok { background: #e8faef; color: #135a3d; }
.result.ng { background: #fff0ee; color: #9d3730; }
.finish { text-align: center; padding: clamp(30px, 7vw, 62px) clamp(22px, 6vw, 70px); }
.trophy { font-size: 4rem; }
.finish h1 { margin-bottom: 8px; }
.small { font-size: .88rem; color: var(--muted); }
.footer-actions { display: flex; justify-content: center; margin-top: 20px; }
@media (max-width: 620px) { .shell { width: min(100% - 24px, 900px); padding-top: 16px; } .group-grid { grid-template-columns: 1fr; } .hero { border-radius: 20px; } .topbar { margin-bottom: 18px; } .overview { align-items: flex-start; } }

.launch-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-bottom: 28px; }
.launch-card { padding: 24px; border: 1px solid var(--line); border-radius: 20px; background: var(--paper); box-shadow: 0 8px 24px rgba(24, 77, 52, .06); }
.launch-card p { min-height: 4.8em; color: var(--muted); line-height: 1.6; }
.sprint-card { background: linear-gradient(145deg, #116746, #1b8c63); border-color: #116746; color: #fff; }
.sprint-card .eyebrow, .sprint-card p { color: #d8f5e6; }
.sprint-card .primary { color: var(--green-dark); background: #fff; box-shadow: 0 4px 0 #bde8d0; }
.section-heading { margin: 28px 0 14px; }
.section-heading h2 { margin-top: 4px; }
.group-actions { display: flex; gap: 9px; margin-top: 18px; }
.compact { padding: 10px 13px; border-radius: 11px; font-size: .9rem; }
.choice.selected { border-color: #65c798; background: #f6fff9; }
.choice-copy { min-width: 0; padding-top: 3px; line-height: 1.45; }
.choice-visual { flex: 0 0 170px; display: grid; gap: 5px; }
.image-crop { position: relative; display: block; width: 170px; height: 105px; overflow: hidden; border: 1px solid #cfded6; border-radius: 10px; background: #f6f8f7; }
.image-crop img { position: absolute; left: 0; top: 0; max-width: none; object-fit: fill; transform-origin: top left; }
.image-label { color: var(--muted); font-size: .8rem; font-weight: 800; text-align: center; }
.sprint-timer { color: #a33f39; font-size: 1.15rem; letter-spacing: .06em; }
.score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 26px 0; }
.score-grid div { padding: 15px 8px; border-radius: 14px; background: var(--mint); }
.score-grid strong, .score-grid span { display: block; }
.score-grid strong { color: var(--green-dark); font-size: 1.45rem; }
.score-grid span { margin-top: 3px; color: var(--muted); font-size: .83rem; }
.review-list { margin-top: 32px; text-align: left; }
.review-item { margin-top: 12px; padding: 18px; border: 1px solid var(--line); border-radius: 16px; background: #fbfefc; }
.review-item h3 { margin: 7px 0; font-size: 1rem; line-height: 1.6; }
.review-item p { margin-bottom: 0; color: var(--muted); line-height: 1.65; }

@media (max-width: 560px) {
  .launch-grid { grid-template-columns: 1fr; }
  .launch-card p { min-height: 0; }
  .choice { flex-wrap: wrap; }
  .choice-index { margin-top: 2px; }
  .choice-visual { flex-basis: calc(100% - 40px); order: 2; }
  .choice-copy { flex: 1 1 calc(100% - 40px); order: 1; }
  .image-crop { width: 100%; height: min(52vw, 180px); }
  .group-actions { flex-wrap: wrap; }
  .score-grid { gap: 7px; }
  .score-grid div { padding: 12px 4px; }
}

</style>
</head>

  q(77, '順序尺度にあたるのはどれか。', ['年齢（歳）', '気温（摂氏）', '身長（センチメートル）', '評価（満足、普通、不満）'], 4, '満足・普通・不満は順序だけに意味がある順序尺度である。'),
  q(78, '円グラフでの表現が適しているのはどれか。', ['がん死亡数の推移', '日本人の血液型の割合', 'バイタルサインの変化', '年度毎の医療法人数の推移'], 2, '円グラフは全体に対する構成比の表現に向く。'),
  q(79, '基本統計量に含まれないのはどれか。', ['平均値', '中央値', '最頻値', '有意水準'], 4, '有意水準は統計的検定の基準であり、基本統計量ではない。'),
  q(80, '平均身長172cm、標準偏差6cmに従う正規分布に近いヒストグラムはどれか。', ['図1', '図2', '図3', '図4'], 1, '図1は172cm付近を中心とした左右対称に近い単峰の分布である。'),
]);

questions[41].choiceImages = visualChoices[41];
questions[80].choiceImages = visualChoices[80];

globalThis.StudyData = { groups, questions };
})();

</script>
<script>
(() => {
function createQuiz(questionIds) {
  return {
    queue: [...questionIds],
    cursor: 0,
    answered: 0,
    wrongCount: 0,
    complete: false,
  };
}

function answerQuiz(state, questionId, selectedChoice, correctChoice) {
  const correct = selectedChoice === correctChoice;
  const queue = correct ? state.queue : [...state.queue, questionId];
  const cursor = state.cursor + 1;

  return {
    correct,
    state: {
      ...state,
      queue,
      cursor,
      answered: state.answered + 1,
      wrongCount: state.wrongCount + (correct ? 0 : 1),
      complete: cursor >= queue.length,
    },
  };
}

globalThis.QuizEngine = { createQuiz, answerQuiz };
})();

</script>
<script>
(() => {
function shuffle(questionIds, random = Math.random) {
  const shuffled = [...questionIds];
  for (let index = shuffled.length - 1; index > 0; index -= 1) {
    const target = Math.floor(random() * (index + 1));
    [shuffled[index], shuffled[target]] = [shuffled[target], shuffled[index]];
  }
  return shuffled;
}

function createSprint(questionIds, random = Math.random) {
  return {
    questionIds: shuffle(questionIds, random),
    cursor: 0,
    answers: {},
    complete: false,
  };
}

function selectSprintAnswer(state, questionId, selectedChoice) {
  if (state.answers[questionId] !== undefined) return state;
  const cursor = Math.min(state.cursor + 1, state.questionIds.length);
  return {
    ...state,
    answers: { ...state.answers, [questionId]: selectedChoice },
    cursor,
    complete: cursor >= state.questionIds.length,
  };
}

function scoreSprint(state, questions) {
  const answeredIds = Object.keys(state.answers).map(Number);
  const wrongIds = answeredIds.filter((id) => state.answers[id] !== questions[id].answer);
  const unansweredIds = state.questionIds.filter((id) => state.answers[id] === undefined);
  return {
    total: state.questionIds.length,
    answered: answeredIds.length,
    correct: answeredIds.length - wrongIds.length,
    wrongIds,
    unansweredIds,
  };
}

globalThis.SprintEngine = { createSprint, selectSprintAnswer, scoreSprint };
})();

</script>
<script>
const { groups, questions } = globalThis.StudyData;
const { answerQuiz, createQuiz } = globalThis.QuizEngine;
const { createSprint, selectSprintAnswer, scoreSprint } = globalThis.SprintEngine;

const app = document.querySelector('#app');
const storageKey = 'medical-info-cram-progress';
const allQuestionIds = Array.from({ length: 80 }, (_, index) => index + 1);
const sprintDurationMs = 45 * 60 * 1000;
let completed = loadCompleted();
let view = { mode: 'home' };
let sprintTickTimer = null;
let sprintDeadlineTimer = null;

function loadCompleted() {
  try {
    const saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
    return new Set(Array.isArray(saved) ? saved : []);
  } catch { return new Set(); }
}

function saveCompleted() {
  try { localStorage.setItem(storageKey, JSON.stringify([...completed])); } catch { /* 学習は継続する */ }
}

function shell(content, home = true) {
  return `<section class="shell"><header class="topbar"><div class="brand"><span class="brand-mark">＋</span><span>医療情報トレーニング</span></div>${home ? '<button class="home-link" data-action="home">ホーム</button>' : ''}</header>${content}</section>`;
}

function progressBar(value) {
  return `<div class="progress-track" aria-label="進捗"><span class="progress-value" style="width:${value}%"></span></div>`;
}

function visualChoice(media) {
  if (!media) return '';
  const { crop } = media;
  const width = (100 / crop.width).toFixed(3);
  const height = (100 / crop.height).toFixed(3);
  const offsetX = (-(crop.x / crop.width) * 100).toFixed(3);
  const offsetY = (-(crop.y / crop.height) * 100).toFixed(3);
  return `<span class="choice-visual"><span class="image-crop"><img src="${media.src}" alt="${media.alt}" style="width:${width}%;height:${height}%;transform:translate(${offsetX}%, ${offsetY}%);"></span><span class="image-label">${media.alt}</span></span>`;
}

function choiceList(question, dataAttribute, { locked = false, selected = null, revealCorrect = false } = {}) {
  return question.choices.map((choice, index) => {
    const number = index + 1;
    const resultClass = revealCorrect ? (number === question.answer ? 'correct' : number === selected ? 'incorrect' : '') : (number === selected ? 'selected' : '');
    return `<button class="choice ${resultClass}" data-${dataAttribute}="${number}" ${locked ? 'disabled' : ''}><span class="choice-index">${number}</span>${visualChoice(question.choiceImages?.[index])}<span class="choice-copy">${choice}</span></button>`;
  }).join('');
}

function renderHome() {
  clearSprintTimers();
  const percent = Math.round((completed.size / groups.length) * 100);
  const cards = groups.map((group, index) => `<article class="group-card ${completed.has(group.id) ? 'complete' : ''}">
    <span class="group-num">GROUP ${String(index + 1).padStart(2, '0')} · ${group.range}</span>
    ${completed.has(group.id) ? '<span class="done-badge">✓</span>' : ''}
    <h3>${group.title}</h3><p>暗記 → 確認テスト → 苦手を反復</p>
    <div class="group-actions"><button class="secondary compact" data-action="group-study" data-group="${group.id}">暗記する</button><button class="primary compact" data-action="group-quiz" data-group="${group.id}">小テスト</button></div>
  </article>`).join('');
  app.innerHTML = shell(`<section class="hero"><span class="eyebrow">試験直前の反復学習</span><h1>覚える。選ぶ。<br>全問正解にする。</h1><p class="lead">問題を一問ずつ確認してから、4択テストへ。間違えた問題は、正解できるまでこのグループ内で何度でも出題されます。</p><div class="overview"><div><strong>${completed.size} / ${groups.length}</strong><span class="small">グループ完了</span></div><div class="progress-wrap">${progressBar(percent)}</div><strong>${percent}%</strong></div></section><section class="launch-grid"><article class="launch-card"><span class="eyebrow">ALL 80</span><h2>全問小テスト</h2><p>問1から問80まで順番に出題。間違えた問題だけを最後に反復します。</p><button class="primary" data-action="all-quiz">全問を始める</button></article><article class="launch-card sprint-card"><span class="eyebrow">45 MINUTES</span><h2>本番スプリント</h2><p>80問をランダム順・45分で挑戦。正誤は採点後にまとめて確認します。</p><button class="primary" data-action="sprint">スプリントを始める</button></article></section><section class="section-heading"><span class="eyebrow">GROUP PRACTICE</span><h2>分野別トレーニング</h2></section><section class="group-grid">${cards}</section><div class="footer-actions"><button class="danger" data-action="reset">進捗をリセット</button></div>`, false);
  bindCommon();
  document.querySelectorAll('[data-action="group-study"]').forEach((button) => button.addEventListener('click', () => startStudy(button.dataset.group)));
  document.querySelectorAll('[data-action="group-quiz"]').forEach((button) => button.addEventListener('click', () => {
    const group = groups.find((item) => item.id === button.dataset.group);
    startQuiz(group.questionIds, group.title, { groupId: group.id, marksGroupComplete: true });
  }));
  document.querySelector('[data-action="all-quiz"]')?.addEventListener('click', () => startQuiz(allQuestionIds, '全問小テスト'));
  document.querySelector('[data-action="sprint"]')?.addEventListener('click', startSprint);
}

function startStudy(groupId) {
  view = { mode: 'study', groupId, index: 0, studyAnswer: null };
  renderStudy();
}

function renderStudy() {
  const group = groups.find((item) => item.id === view.groupId);
  const questionId = group.questionIds[view.index];
  const question = questions[questionId];
  const percent = Math.round(((view.index + 1) / group.questionIds.length) * 100);
  const choices = choiceList(question, 'study-choice', { locked: Boolean(view.studyAnswer), selected: view.studyAnswer?.selected, revealCorrect: Boolean(view.studyAnswer) });
  const isLast = view.index === group.questionIds.length - 1;
  const action = view.studyAnswer ? `<button class="primary" data-action="study-next">${isLast ? '確認テストを始める' : '次へ →'}</button>` : '<span class="small">選択肢を一つ選んでください。</span>';
  const feedback = view.studyAnswer ? `<div class="result ${view.studyAnswer.correct ? 'ok' : 'ng'}"><strong>${view.studyAnswer.correct ? '✓ 正解！' : '✕ 不正解'}</strong><br>正解：${question.answer}. ${question.choices[question.answer - 1]}<br>${question.explanation}</div>` : '';
  app.innerHTML = shell(`<article class="card study-card"><div class="meta-row"><span>${group.title}</span><span>問 ${question.id} · ${view.index + 1}/${group.questionIds.length}</span></div>${progressBar(percent)}<h1 class="question">${question.prompt}</h1><div class="choice-list">${choices}</div>${feedback}<div class="actions">${action}<button class="secondary" data-action="home">あとで続ける</button></div></article>`);
  bindCommon();
  document.querySelectorAll('[data-study-choice]').forEach((button) => button.addEventListener('click', () => chooseStudyAnswer(Number(button.dataset.studyChoice))));
  document.querySelector('[data-action="study-next"]')?.addEventListener('click', () => {
    if (isLast) startQuiz(group.questionIds, group.title, { groupId: group.id, marksGroupComplete: true });
    else { view.index += 1; view.studyAnswer = null; renderStudy(); }
  });
}

function chooseStudyAnswer(selected) {
  const group = groups.find((item) => item.id === view.groupId);
  const question = questions[group.questionIds[view.index]];
  view.studyAnswer = { selected, correct: selected === question.answer };
  renderStudy();
}

function startQuiz(questionIds, title, { groupId = null, marksGroupComplete = false } = {}) {
  view = { mode: 'quiz', title, groupId, marksGroupComplete, questionIds: [...questionIds], quiz: createQuiz(questionIds), feedback: null };
  renderQuiz();
}

function renderQuiz() {
  if (view.quiz.complete && !view.feedback) { finishQuiz(); return; }
  const feedback = view.feedback;
  const questionId = feedback ? feedback.questionId : view.quiz.queue[view.quiz.cursor];
  const question = questions[questionId];
  const choices = choiceList(question, 'choice', { locked: Boolean(feedback), selected: feedback?.selected, revealCorrect: Boolean(feedback) });
  const answered = feedback ? view.quiz.cursor : view.quiz.cursor + 1;
  const remaining = view.quiz.queue.length - view.quiz.cursor;
  app.innerHTML = shell(`<article class="card study-card"><div class="meta-row"><span>確認テスト · ${view.title}</span><span>${answered}問目</span></div>${progressBar(Math.min(100, Math.round((view.quiz.cursor / view.quiz.queue.length) * 100)))}<p class="quiz-note">残り ${remaining} 問。間違えた問題は最後にもう一度出題されます。</p><h1 class="question">問 ${question.id}　${question.prompt}</h1><div class="choice-list">${choices}</div>${feedback ? `<div class="result ${feedback.correct ? 'ok' : 'ng'}"><strong>${feedback.correct ? '✓ 正解！' : '✕ もう一度挑戦！'}</strong><br>正解：${question.answer}. ${question.choices[question.answer - 1]}<br>${question.explanation}</div><div class="actions"><button class="primary" data-action="quiz-next">次の問題 →</button></div>` : ''}</article>`);
  bindCommon();
  document.querySelectorAll('[data-choice]').forEach((button) => button.addEventListener('click', () => chooseAnswer(Number(button.dataset.choice))));
  document.querySelector('[data-action="quiz-next"]')?.addEventListener('click', () => { view.feedback = null; renderQuiz(); });
}

function chooseAnswer(selected) {
  const question = questions[view.quiz.queue[view.quiz.cursor]];
  const result = answerQuiz(view.quiz, question.id, selected, question.answer);
  view.quiz = result.state;
  view.feedback = { correct: result.correct, selected, questionId: question.id };
  renderQuiz();
}

function finishQuiz() {
  if (view.marksGroupComplete && view.groupId) { completed.add(view.groupId); saveCompleted(); }
  const completedLabel = view.marksGroupComplete ? 'GROUP CLEAR' : 'ALL QUESTIONS CLEAR';
  app.innerHTML = shell(`<article class="card finish"><div class="trophy">🏆</div><span class="eyebrow">${completedLabel}</span><h1>全問正解！</h1><p class="lead">「${view.title}」を完了しました。間違えた回数：${view.quiz.wrongCount}回</p><div class="actions"><button class="primary" data-action="home">ホームへ</button><button class="secondary" data-action="retry">もう一度テストする</button></div></article>`);
  bindCommon();
  document.querySelector('[data-action="retry"]')?.addEventListener('click', () => startQuiz(view.questionIds, view.title, { groupId: view.groupId, marksGroupComplete: view.marksGroupComplete }));
}

function clearSprintTimers() {
  if (sprintTickTimer) clearInterval(sprintTickTimer);
  if (sprintDeadlineTimer) clearTimeout(sprintDeadlineTimer);
  sprintTickTimer = null;
  sprintDeadlineTimer = null;
}

function formatRemaining(milliseconds) {
  const seconds = Math.max(0, Math.ceil(milliseconds / 1000));
  return `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
}

function startSprint() {
  clearSprintTimers();
  const startedAt = Date.now();
  view = { mode: 'sprint', sprint: createSprint(allQuestionIds), startedAt, deadline: startedAt + sprintDurationMs };
  sprintTickTimer = setInterval(updateSprintClock, 250);
  sprintDeadlineTimer = setTimeout(() => finishSprint('time'), sprintDurationMs);
  renderSprint();
}

function updateSprintClock() {
  if (view.mode !== 'sprint') return;
  const remaining = view.deadline - Date.now();
  if (remaining <= 0) { finishSprint('time'); return; }
  const timer = document.querySelector('[data-sprint-clock]');
  if (timer) timer.textContent = formatRemaining(remaining);
}

function renderSprint() {
  const questionId = view.sprint.questionIds[view.sprint.cursor];
  const question = questions[questionId];
  const remaining = view.deadline - Date.now();
  const choices = choiceList(question, 'sprint-choice');
  app.innerHTML = shell(`<article class="card study-card sprint-session"><div class="meta-row"><span>本番スプリント</span><strong class="sprint-timer" data-sprint-clock>${formatRemaining(remaining)}</strong></div>${progressBar(Math.round((view.sprint.cursor / view.sprint.questionIds.length) * 100))}<p class="quiz-note">${view.sprint.cursor + 1} / ${view.sprint.questionIds.length} 問　正誤は採点後にまとめて表示されます。</p><h1 class="question">問 ${question.id}　${question.prompt}</h1><div class="choice-list">${choices}</div><div class="actions"><button class="secondary" data-action="sprint-finish">採点する</button></div></article>`);
  bindCommon();
  document.querySelectorAll('[data-sprint-choice]').forEach((button) => button.addEventListener('click', () => chooseSprintAnswer(Number(button.dataset.sprintChoice))));
  document.querySelector('[data-action="sprint-finish"]')?.addEventListener('click', () => finishSprint('manual'));
}

function chooseSprintAnswer(selected) {
  const questionId = view.sprint.questionIds[view.sprint.cursor];
  view.sprint = selectSprintAnswer(view.sprint, questionId, selected);
  if (view.sprint.complete) finishSprint('complete'); else renderSprint();
}

function finishSprint(reason) {
  if (view.mode !== 'sprint') return;
  clearSprintTimers();
  const elapsed = Math.min(sprintDurationMs, Math.max(0, Date.now() - view.startedAt));
  view = { mode: 'sprint-result', reason, elapsed, sprint: view.sprint, result: scoreSprint(view.sprint, questions) };
  renderSprintResult();
}

function renderSprintResult() {
  const { result } = view;
  const reviewIds = [...result.wrongIds, ...result.unansweredIds].sort((a, b) => a - b);
  const review = reviewIds.length ? reviewIds.map((id) => {
    const question = questions[id];
    const unanswered = view.result.unansweredIds.includes(id);
    return `<article class="review-item"><span class="eyebrow">問 ${id} · ${unanswered ? '未解答' : '不正解'}</span><h3>${question.prompt}</h3><p><strong>正解：${question.answer}. ${question.choices[question.answer - 1]}</strong><br>${question.explanation}</p></article>`;
  }).join('') : '<p class="lead">すべて正解です。素晴らしい！</p>';
  const reason = view.reason === 'time' ? '時間切れで採点しました。' : '採点結果です。';
  app.innerHTML = shell(`<article class="card finish sprint-result"><div class="trophy">⏱</div><span class="eyebrow">SPRINT RESULT</span><h1>${result.correct} / ${result.total}</h1><p class="lead">${reason}<br>正答率：${Math.round((result.correct / result.total) * 100)}%　所要時間：${formatRemaining(view.elapsed)}</p><div class="score-grid"><div><strong>${result.answered}</strong><span>解答済み</span></div><div><strong>${result.wrongIds.length}</strong><span>不正解</span></div><div><strong>${result.unansweredIds.length}</strong><span>未解答</span></div></div><section class="review-list"><h2>見直し</h2>${review}</section><div class="actions"><button class="primary" data-action="sprint-retry">もう一度スプリント</button><button class="secondary" data-action="home">ホームへ</button></div></article>`);
  bindCommon();
  document.querySelector('[data-action="sprint-retry"]')?.addEventListener('click', startSprint);
}

function bindCommon() {
  document.querySelectorAll('[data-action="home"]').forEach((button) => button.addEventListener('click', renderHome));
  document.querySelector('[data-action="reset"]')?.addEventListener('click', () => { completed = new Set(); saveCompleted(); renderHome(); });
}

renderHome();

</script>
